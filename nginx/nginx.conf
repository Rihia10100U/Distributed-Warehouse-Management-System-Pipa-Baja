user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log notice;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

# Konfigurasi Layer 4 (TCP Stream Routing)
stream {
    # Gerbang Pintu Masuk ke Gudang 1 (Akses via Port 5431)
    server {
        listen 5431;
        proxy_pass pg-plant1:5432;
        proxy_timeout 10m;
        proxy_connect_timeout 30s;
    }

    # Gerbang Pintu Masuk ke Gudang 2 (Akses via Port 5432)
    server {
        listen 5432;
        proxy_pass pg-plant2:5432;
        proxy_timeout 10m;
        proxy_connect_timeout 30s;
    }

    # Gerbang Pintu Masuk ke Hub Pusat Agregator (Akses via Port 5430)
    server {
        listen 5430;
        proxy_pass pg-hub:5432;
        proxy_timeout 10m;
        proxy_connect_timeout 30s;
    }
}